# This is the default English resource bundle
# It contains all the text messages used by the application
# When no specific locale is set, Java uses this file

# Prompt shown to the user when asking for a command
prompt = Input command:

# Message shown before listing all available locales
locales = The available locales are:

# Message shown after setting a locale. {0} is a placeholder for the locale name
locale.set = The current locale is {0}

# Message shown before displaying locale information. {0} is a placeholder
info = Information about {0}:

# Error message shown when user types an unknown command
invalid = Unknown command
