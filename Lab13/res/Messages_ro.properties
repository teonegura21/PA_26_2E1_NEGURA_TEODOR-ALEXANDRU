# This is the Romanian resource bundle
# It contains all the same keys as Messages.properties but with Romanian translations
# Java uses this file when the locale is set to Romanian (ro)

# Prompt shown to the user when asking for a command (Romanian)
prompt = Comanda ta:

# Message shown before listing all available locales (Romanian)
locales = Localizarile disponibile sunt:

# Message shown after setting a locale. {0} is a placeholder for the locale name
locale.set = Localizarea curenta este {0}

# Message shown before displaying locale information. {0} is a placeholder
info = Informatii despre localizarea {0}:

# Error message shown when user types an unknown command (Romanian)
invalid = Comanda necunoascuta
